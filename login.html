<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="login.js" defer></script>
</head>
<body>
    
    <div id="fundo">

        <img id="img" src="pear-removebg-preview.png" alt=""> 


        <form action="">

        <h1>Cadastre-se</h1>

        <label class="nome">Nome:</label>
        <input type="text"  placeholder="Digite seu nome:" name="" id="nomeUsuario">

        <label for="">Sobrenome:</label>
        <input type="text"placeholder="Digite seu sobrenome:" name="" id="sobrenomeUsuario">
    
        <label for="">Email:</label>
        <input type="email" placeholder="seuemail@gmail.com" name="" id="emailUsuario">
        
        <label for="">Senha:</label>
        <input type="password" placeholder="Crie sua senha" name="" id="senhaUsuario">
       

        <button type="submit" id="botaoEnviar">Enviar</button>
    

    </form>
    </div>

   
    
    
</body>
</html>
